<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>APCS 裝飲料：水位上升模擬器 (連通空間版)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background-color: #f4f7f6; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 650px; width: 100%; }
        .input-section { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 0.9em; color: #555; margin-bottom: 5px; font-weight: bold; }
        input { padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .btn-main { padding: 10px 20px; cursor: pointer; background-color: #28a745; color: white; border: none; border-radius: 4px; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-pour { background-color: #007bff; }
        
        #cup-area { margin: 40px 0; display: flex; flex-direction: column; align-items: center; min-height: 300px; justify-content: flex-end; }
        /* 移除中間邊框，展現連通感 */
        .cup-part { border: 3px solid #444; border-bottom: none; position: relative; background: #fff; transition: width 0.3s; }
        #top-cup { border-bottom: none; z-index: 2; }
        #bottom-cup { border-bottom: 3px solid #444; z-index: 1; margin-top: -3px; } /* 稍微重疊消除裂縫 */
        
        .water { position: absolute; bottom: 0; left: 0; width: 100%; background-color: rgba(30, 144, 255, 0.7); transition: height 0.4s ease; }
        
        .stats { display: flex; justify-content: space-between; background: #e9ecef; padding: 15px; border-radius: 8px; margin-top: 20px; }
        .stat-box { text-align: center; flex: 1; }
        .stat-val { font-size: 1.5em; font-weight: bold; color: #333; display: block; }
        .highlight { color: #d9534f; }
    </style>
</head>
<body>

<div class="container">
    <h2>裝飲料水位模擬 (連通空間)</h2>
    
    <div class="input-section">
        <div class="input-group"><label>下層寬 (w1)</label><input type="number" id="w1" value="10"></div>
        <div class="input-group"><label>下層高 (h1)</label><input type="number" id="h1" value="10"></div>
        <div class="input-group"><label>上層寬 (w2)</label><input type="number" id="w2" value="5"></div>
        <div class="input-group"><label>上層高 (h2)</label><input type="number" id="h2" value="10"></div>
    </div>
    <button class="btn-main" onclick="setupCup()">設定新杯子規格</button>
    
    <hr style="margin: 25px 0; border: 0; border-top: 1px solid #eee;">
    
    <div class="input-group">
        <label>倒入飲料體積 (v):</label>
        <div style="display: flex; gap: 10px;">
            <input type="number" id="volumeInput" style="flex: 1;" placeholder="輸入每次倒入的 cm³">
            <button class="btn-main btn-pour" style="width: auto; margin: 0;" onclick="pourWater()">倒入飲料</button>
        </div>
    </div>

    <div class="stats">
        <div class="stat-box">目前總高度<span class="stat-val" id="curH">0</span>cm</div>
        <div class="stat-box">本次上升量<span class="stat-val" id="diffH">0</span>cm</div>
        <div class="stat-box">最高上升紀錄<span class="stat-val highlight" id="maxDiff">0</span>cm</div>
    </div>

    <div id="cup-area">
        <div id="top-cup" class="cup-part"><div id="top-water" class="water"></div></div>
        <div id="bottom-cup" class="cup-part"><div id="bottom-water" class="water"></div></div>
    </div>
</div>

<script>
    let w1, w2, h1, h2;
    let totalV = 0;
    let lastH = 0;
    let maxRise = 0;

    function setupCup() {
        w1 = parseFloat(document.getElementById('w1').value);
        h1 = parseFloat(document.getElementById('h1').value);
        w2 = parseFloat(document.getElementById('w2').value);
        h2 = parseFloat(document.getElementById('h2').value);
        
        totalV = 0;
        lastH = 0;
        maxRise = 0;
        updateUI(0);

        const scale = 15; // 放大比例
        const bCup = document.getElementById('bottom-cup');
        const tCup = document.getElementById('top-cup');
        
        bCup.style.width = (w1 * scale) + 'px';
        bCup.style.height = (h1 * scale) + 'px';
        tCup.style.width = (w2 * scale) + 'px';
        tCup.style.height = (h2 * scale) + 'px';
    }

    function pourWater() {
        const v = parseFloat(document.getElementById('volumeInput').value);
        if (isNaN(v) || v <= 0) return;

        const v1_cap = w1 * w1 * h1;
        const v2_cap = w2 * w2 * h2;
        const totalCap = v1_cap + v2_cap;

        // 更新體積，但不超過總容量 [1]
        totalV = Math.min(totalV + v, totalCap);

        // 計算新高度 [1]
        let newH = 0;
        if (totalV <= v1_cap) {
            newH = totalV / (w1 * w1);
        } else {
            newH = h1 + (totalV - v1_cap) / (w2 * w2);
        }

        const currentRise = newH - lastH;
        if (currentRise > maxRise) maxRise = currentRise;

        updateUI(currentRise);
        lastH = newH;
        document.getElementById('volumeInput').value = '';
    }

    function updateUI(diff) {
        document.getElementById('curH').innerText = lastH.toFixed(2);
        document.getElementById('diffH').innerText = diff.toFixed(2);
        document.getElementById('maxDiff').innerText = maxRise.toFixed(2);

        const bWater = document.getElementById('bottom-water');
        const tWater = document.getElementById('top-water');

        // 視覺化水位連通效果
        if (lastH <= h1) {
            bWater.style.height = (lastH / h1 * 100) + '%';
            tWater.style.height = '0%';
        } else {
            bWater.style.height = '100%';
            tWater.style.height = ((lastH - h1) / h2 * 100) + '%';
        }
    }

    setupCup();
</script>
</body>
</html>
